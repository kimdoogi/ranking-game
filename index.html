<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>미니게임 아케이드 🎮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% -10%, #1a1440, #0a0a16 60%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }
    h1 {
      font-size: clamp(30px, 8vw, 48px);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      background: linear-gradient(135deg, #ff2d95, #ff8a3d 45%, #ffd23f);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .sub { margin-top: 10px; color: #9aa0c0; font-size: 15px; text-align: center; }
    .grid {
      margin-top: 40px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(20, 20, 40, .55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, .08);
      text-decoration: none;
      color: #fff;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .card:hover, .card:active {
      transform: translateY(-3px);
      border-color: rgba(255, 138, 61, .5);
      box-shadow: 0 12px 30px rgba(255, 77, 109, .18);
    }
    .emoji {
      font-size: 40px;
      width: 62px; height: 62px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,77,109,.22), rgba(123,91,255,.22));
    }
    .meta { flex: 1; min-width: 0; }
    .name { font-size: 19px; font-weight: 700; }
    .desc { margin-top: 4px; font-size: 13px; color: #9aa0c0; }
    .arrow { color: #ffd23f; font-size: 22px; flex-shrink: 0; }
    footer { margin-top: 44px; color: #565c7e; font-size: 12px; }
    footer a { color: #7b8bff; text-decoration: none; }
  </style>
</head>
<body>
  <h1>미니게임 아케이드 🎮</h1>
  <p class="sub">플레이할 게임을 골라보세요</p>

  <div class="grid">
    <a class="card" href="monster-chase.html">
      <div class="emoji">👾</div>
      <div class="meta">
        <div class="name">먹보 괴물 대탈주</div>
        <div class="desc">괴물을 피해 끝까지 살아남기</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="obstacle-run.html">
      <div class="emoji">🏁</div>
      <div class="meta">
        <div class="name">장애물 대탈주 300</div>
        <div class="desc">장애물을 넘어 300m 완주하기</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="push-royale.html">
      <div class="emoji">🏆</div>
      <div class="meta">
        <div class="name">밀어내기 배틀 로얄</div>
        <div class="desc">경쟁자를 밀어내고 최후의 1인이 되기</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <footer>Made with 🕹️ · <a href="https://github.com/kimdoogi/ranking-game">GitHub</a></footer>
</body>
</html>
